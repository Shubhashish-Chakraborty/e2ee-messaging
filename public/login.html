<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — E2EE Messaging</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0d1117',
                        darkCard: '#161b22',
                        darkBorder: '#30363d'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #e6edf3; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center p-4">

    <div class="w-full max-w-[400px] bg-[#161b22] border border-[#30363d] rounded-[20px] p-8 sm:p-10 shadow-2xl shadow-cyan-900/5 animate-fade-in">
        
        <!-- Header -->
        <div class="flex flex-col items-center text-center mb-8">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-600 to-cyan-800 flex items-center justify-center text-white text-xl mb-5 shadow-lg shadow-cyan-900/30">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-100 mb-1">Welcome Back</h1>
            <p class="text-sm text-slate-400">Login to your encrypted messaging account</p>
        </div>

        <!-- Feedback Messages -->
        <div id="form-error" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg p-3 text-sm font-medium mb-5 text-center"></div>
        <div id="form-success" class="hidden bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-lg p-3 text-sm font-medium mb-5 text-center"></div>

        <!-- Form -->
        <form id="login-form" novalidate class="space-y-4">
            
            <div>
                <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1.5">Username</label>
                <input id="username" name="username" type="text"
                       class="w-full bg-[#0d1117] border border-[#30363d] text-slate-200 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600 transition-colors placeholder:text-slate-600"
                       placeholder="shubh" autocomplete="username" required>
            </div>

            <div class="mb-6">
                <div class="flex items-center justify-between mb-1.5">
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wide">Password</label>
                </div>
                <input id="password" name="password" type="password"
                       class="w-full bg-[#0d1117] border border-[#30363d] text-slate-200 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600 transition-colors placeholder:text-slate-600"
                       placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button id="submit-btn" type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold text-sm rounded-xl py-3 mt-2 transition-colors shadow-lg shadow-cyan-900/30 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-slate-400">
            Don't have an account? 
            <a href="/signup.html" class="text-cyan-400 hover:text-cyan-300 font-medium transition-colors">Sign Up</a>
        </div>
        <div class="mt-4 text-center">
            <a href="/" class="text-xs text-slate-500 hover:text-slate-400 transition-colors"><i class="fas fa-arrow-left mr-1"></i> Back to Home</a>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
