<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not your real data with us!</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0d1117',
                        darkCard: '#161b22',
                        darkBorder: '#30363d'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #0d1117; color: #e6edf3; }

        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .status-dot.loading { background-color: #fbbf24; animation: pulse 1s infinite; }
        .status-dot.success { background-color: #34d399; }
        .status-dot.error { background-color: #f87171; }
        .status-dot.idle { background-color: #64748b; }
    </style>
</head>

<body class="min-h-screen font-sans">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 bg-[#0d1117]/80 backdrop-blur-md border-b border-[#30363d]">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">

            <!-- Left spacer -->
            <div class="hidden sm:block w-10"></div>

            <!-- Title -->
            <div class="flex items-center gap-2 font-semibold text-sm sm:text-base text-center">
                <i class="fas fa-lock text-cyan-400"></i>
                <span class="truncate max-w-[180px] sm:max-w-none">
                    End-to-End Encrypted Messaging
                </span>
            </div>

            <!-- Actions -->
            <div id="nav-actions" class="flex items-center gap-2 sm:gap-3">
                <!-- Injected -->
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-6xl mx-auto px-4 py-6 sm:py-10">

        <!-- Heading -->
        <h1 class="text-lg sm:text-2xl md:text-3xl text-center font-bold mb-6">
            Find your peers and start the conversation!
        </h1>

        <!-- Status + Button -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">

            <div class="flex items-center gap-3">
                <div id="status-indicator" class="status-dot loading"></div>
                <p id="status-message" class="text-xs sm:text-sm text-slate-400">
                    <i class="fas fa-spinner fa-spin mr-2 text-cyan-400"></i>
                    Fetching users...
                </p>
            </div>

            <button id="refresh-btn"
                class="w-full sm:w-auto flex justify-center items-center gap-2 px-4 py-2 rounded-lg bg-[#161b22] border border-[#30363d] text-sm text-slate-300 hover:bg-[#21262d] hover:text-white transition">
                <i class="fas fa-rotate-right"></i> Refresh
            </button>
        </div>

        <!-- Users Grid -->
        <div id="users-grid"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
        </div>

        <!-- Empty State -->
        <div id="empty-state"
            class="hidden flex flex-col items-center justify-center p-8 sm:p-14 text-center bg-[#161b22] border border-dashed border-[#30363d] rounded-2xl">

            <div class="h-14 w-14 sm:h-16 sm:w-16 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-user-slash text-xl sm:text-2xl text-slate-400"></i>
            </div>

            <h3 class="text-base sm:text-lg font-semibold mb-2">No users found</h3>

            <p class="text-sm text-slate-400 mb-5 max-w-[260px]">
                The directory is empty. Try refreshing.
            </p>

            <button id="empty-retry-btn"
                class="flex items-center gap-2 px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white text-sm">
                <i class="fas fa-sync-alt"></i> Retry
            </button>
        </div>

        <!-- Error -->
        <div id="error-alert"
            class="hidden mt-6 bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex gap-3">

            <i class="fas fa-circle-exclamation text-red-400"></i>

            <div class="flex-1">
                <h4 id="error-text" class="text-sm font-semibold text-red-400">
                    Something went wrong
                </h4>
                <p id="error-detail" class="text-xs sm:text-sm text-red-400/80">
                    Unable to load users
                </p>
            </div>

            <button id="dismiss-error" class="text-red-400/60 hover:text-red-400">
                <i class="fas fa-times"></i>
            </button>
        </div>

    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
